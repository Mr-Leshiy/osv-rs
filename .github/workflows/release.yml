name: Publish to crates.io

on:
  push:
    tags:
      - '*/v[0-9]*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Parse tag
        id: tag
        run: |
          # Tag format: <crate-name>/v<version>  e.g. osv-db/v0.6.2
          TAG="${GITHUB_REF_NAME}"
          CRATE="${TAG%%/*}"
          VERSION="${TAG#*/v}"

          if [ -z "$CRATE" ] || [ -z "$VERSION" ]; then
            echo "Error: tag '$TAG' does not match expected format <crate-name>/v<version>"
            exit 1
          fi

          echo "crate=$CRATE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Crate:   $CRATE"
          echo "Version: $VERSION"

      - name: Verify version matches Cargo.toml
        run: |
          CRATE="${{ steps.tag.outputs.crate }}"
          TAG_VERSION="${{ steps.tag.outputs.version }}"

          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r --arg name "$CRATE" '.packages[] | select(.name == $name) | .version')

          if [ -z "$CARGO_VERSION" ]; then
            echo "Error: crate '$CRATE' not found in workspace"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: tag version ($TAG_VERSION) does not match $CRATE Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

          echo "✓ $CRATE v$TAG_VERSION"

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ${{ steps.tag.outputs.crate }} --token $CARGO_REGISTRY_TOKEN
